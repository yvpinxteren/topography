<div id="exit-dialog" class="exit-dialog" hidden>
  <div class="exit-dialog-content">
    <h3>EXIT GAME?</h3>
    <p>Are you sure you want to quit the game?</p>
    <div class="exit-dialog-buttons">
      <button id="btn-exit-yes" class="exit-btn exit-btn-yes">YES</button>
      <button id="btn-exit-no" class="exit-btn exit-btn-no">NO</button>
    </div>
  </div>
</div>
