<div id="game-over-dialog" class="exit-dialog" hidden>
  <div class="exit-dialog-content game-over-dialog-content">
    <h3>GAME OVER</h3>
    <p>Your helicopter crashed.</p>
    <p class="game-over-score">SCORE: <span id="game-over-score-value">0</span></p>
    <label class="game-over-label" for="game-over-name">ENTER YOUR NAME</label>
    <input id="game-over-name" class="game-over-input" type="text" maxlength="14" autocomplete="nickname" />
    <div class="exit-dialog-buttons">
      <button id="btn-game-over-confirm" class="exit-btn exit-btn-yes">OK</button>
    </div>
  </div>
</div>
