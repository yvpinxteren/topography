<div class="screen" id="game-netherlands-screen" hidden>
  <div class="game-viewport">
    <div class="game-top-hud">
      <div class="hud-stat">
        <span class="hud-label">POINTS</span>
        <span class="hud-value" id="hud-points">0</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">TARGET</span>
        <span class="hud-value" id="hud-target">---</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">TIME</span>
        <span class="hud-value" id="hud-time">3:00</span>
      </div>
    </div>

    <div class="countdown-overlay" id="countdown-overlay">
      <div class="countdown-text" id="countdown-text">3</div>
    </div>

    <img id="map-netherlands" class="game-map" src="__MAP_NETHERLANDS_URL__" alt="Map of Netherlands">
    <div class="target-marker" id="target-marker" hidden></div>
    <div class="crash-explosion" id="crash-explosion" hidden></div>

    <div class="helicopter">
      <svg class="helicopter-svg" viewBox="0 0 128 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g class="helicopter-body">
          <path d="M42 12 H86 L94 20 V38 L86 46 H42 L34 38 V20 Z" fill="#15c800"/>
          <path d="M46 16 H82 L88 22 V38 L80 42 H48 L40 36 V22 Z" fill="#ffe100"/>
          <path d="M40 42 H88 L96 50 V96 L88 110 H40 L32 96 V50 Z" fill="#10dd00"/>
          <path d="M46 48 H82 L88 56 V94 L80 102 H48 L40 92 V56 Z" fill="#00f000"/>
          <rect x="38" y="50" width="8" height="44" fill="#26ff00"/>
          <rect x="82" y="50" width="8" height="44" fill="#00ab00"/>
          <rect x="50" y="96" width="28" height="18" rx="3" fill="#14c800"/>
          <rect x="44" y="104" width="40" height="10" rx="2" fill="#00dd00"/>
          <rect x="58" y="112" width="12" height="36" fill="#18e200"/>
          <rect x="54" y="148" width="6" height="10" fill="#00c300"/>
          <rect x="68" y="148" width="6" height="10" fill="#00c300"/>
          <rect x="48" y="150" width="10" height="6" fill="#6fff00"/>
          <rect x="70" y="150" width="10" height="6" fill="#6fff00"/>
          <rect x="30" y="56" width="6" height="34" fill="#10dd00"/>
          <rect x="92" y="56" width="6" height="34" fill="#10dd00"/>
          <rect x="26" y="80" width="12" height="4" fill="#008d00"/>
          <rect x="90" y="80" width="12" height="4" fill="#008d00"/>
        </g>
        <g class="tail-rotor" style="transform-origin: 64px 154px">
          <rect x="52" y="152" width="24" height="4" fill="#00d000"/>
          <rect x="62" y="142" width="4" height="24" fill="#00d000"/>
        </g>
        <g class="main-rotors">
          <rect x="10" y="59" width="108" height="10" transform="rotate(45 64 64)" fill="#0a0a0a" opacity="0.58"/>
          <rect x="10" y="59" width="108" height="10" transform="rotate(-45 64 64)" fill="#0a0a0a" opacity="0.58"/>
          <rect x="12" y="60" width="104" height="8" transform="rotate(45 64 64)" fill="#ffea00" opacity="0.82"/>
          <rect x="12" y="60" width="104" height="8" transform="rotate(-45 64 64)" fill="#ffea00" opacity="0.82"/>
          <rect x="14" y="61" width="100" height="2" transform="rotate(45 64 64)" fill="#fff38a" opacity="0.48"/>
          <rect x="14" y="61" width="100" height="2" transform="rotate(-45 64 64)" fill="#fff38a" opacity="0.48"/>
          <rect x="55" y="55" width="18" height="18" fill="#0a0a0a" opacity="0.82"/>
          <rect x="58" y="58" width="12" height="12" fill="#ffd900" opacity="0.92"/>
          <rect x="61" y="61" width="6" height="6" fill="#fff38a" opacity="0.85"/>
        </g>
      </svg>
    </div>

    <div class="game-coordinates" id="game-coordinates">
      <span>X: 0</span>
      <span>Y: 0</span>
    </div>

    <div class="mobile-joystick" id="mobile-joystick" aria-hidden="true">
      <div class="mobile-joystick__thumb" id="mobile-joystick-thumb"></div>
    </div>
  </div>
</div>
