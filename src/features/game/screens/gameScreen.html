<div class="screen" id="game-netherlands-screen" hidden>
  <div class="game-viewport">
    <div class="game-top-hud">
      <div class="hud-stat">
        <span class="hud-label">POINTS</span>
        <span class="hud-value" id="hud-points">0</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">TARGET</span>
        <span class="hud-value" id="hud-target">---</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">TIME</span>
        <span class="hud-value" id="hud-time">3:00</span>
      </div>
    </div>

    <div class="countdown-overlay" id="countdown-overlay">
      <div class="countdown-text" id="countdown-text">3</div>
    </div>

    <img id="map-netherlands" class="game-map" src="/map-nederland.png" alt="Map of Netherlands">
    <div class="target-marker" id="target-marker" hidden></div>

    <div class="helicopter">
      <svg class="helicopter-svg" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
        <g class="main-rotors">
          <ellipse cx="60" cy="15" rx="35" ry="8" fill="none" stroke="#ffff00" stroke-width="2" opacity="0.7"/>
          <line x1="25" y1="15" x2="95" y2="15" stroke="#ffff00" stroke-width="3" opacity="0.8"/>
        </g>
        <line x1="60" y1="15" x2="60" y2="35" stroke="#00ff00" stroke-width="2"/>
        <ellipse cx="60" cy="45" rx="18" ry="12" fill="#00ff00" stroke="#ffff00" stroke-width="2"/>
        <circle cx="52" cy="42" r="2.5" fill="#ffff00"/>
        <circle cx="68" cy="42" r="2.5" fill="#ffff00"/>
        <line x1="42" y1="45" x2="10" y2="50" stroke="#00ff00" stroke-width="2"/>
        <circle cx="10" cy="50" r="5" fill="#00ff00" stroke="#ffff00" stroke-width="1"/>
        <g class="tail-rotor" style="transform-origin: 10px 50px">
          <line x1="5" y1="50" x2="15" y2="50" stroke="#ffff00" stroke-width="2"/>
          <line x1="10" y1="45" x2="10" y2="55" stroke="#ffff00" stroke-width="2" opacity="0.6"/>
        </g>
        <line x1="48" y1="57" x2="45" y2="70" stroke="#ffff00" stroke-width="2"/>
        <line x1="72" y1="57" x2="75" y2="70" stroke="#ffff00" stroke-width="2"/>
        <line x1="45" y1="70" x2="75" y2="70" stroke="#ffff00" stroke-width="2"/>
        <line x1="50" y1="70" x2="70" y2="70" stroke="#ffff00" stroke-width="2"/>
      </svg>
    </div>

    <div class="game-coordinates" id="game-coordinates">
      <span>X: 0</span>
      <span>Y: 0</span>
    </div>
  </div>
</div>
